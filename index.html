<aside class="sidebar">
    <div class="widget-box">
        <h3>Hora</h3>
        <div id="clock">00:00:00</div>
    </div>
    
    <div class="widget-box">
        <h3>Clima (Vallegrande)</h3>
        <div id="weather-data" style="text-align: left; padding: 10px;">
            <p style="margin: 10px 0;"><i class="fas fa-thermometer-half" style="color: var(--rojo);"></i> <strong>Temp:</strong> <span id="temp">22°C</span></p>
            <p style="margin: 10px 0;"><i class="fas fa-tint" style="color: var(--rojo);"></i> <strong>Hum:</strong> <span id="humidity">45%</span></p>
            <p style="margin: 10px 0;"><i class="fas fa-wind" style="color: var(--rojo);"></i> <strong>Viento:</strong> <span id="wind">12 km/h</span></p>
        </div>
    </div>
</aside>

<script>
    // Función para el reloj (que ya tenías)
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('es-ES');
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

<style>
    /* Asegúrate de tener estos estilos en tu CSS principal para que luzca igual */
    .widget-box { 
        background: #1a1a1a; 
        padding: 15px; 
        border-radius: 10px; 
        border: 1px solid #333; 
        text-align: center; 
        margin-bottom: 20px;
    }
    .widget-box h3 {
        color: white;
        margin-top: 0;
        font-size: 1.1em;
        border-bottom: 1px solid #333;
        padding-bottom: 10px;
    }
    #clock { 
        font-size: 1.8em; 
        font-weight: bold; 
        color: var(--rojo); 
        margin-top: 10px; 
    }
    #weather-data {
        font-size: 0.9em;
        color: #ccc;
    }
</style>
