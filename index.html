<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio | Vallegrande 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }

        nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }

        /* Contenedor principal con Banners */
        .wrapper { display: flex; justify-content: center; gap: 20px; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .banner-side { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        .banner-img { width: 100%; border-radius: 10px; border: 1px solid var(--rojo); display: block; }

        .container { flex: 1; max-width: 950px; }
        .seccion { display: none; width: 100%; }
        .seccion.active { display: block; }

        /* Reproductor Radio */
        .reproductor-card { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=800&auto=format&fit=crop'); 
            background-size: cover; background-position: center; border: 1px solid var(--rojo); border-radius: 20px; padding: 50px 20px; text-align: center;
        }
        #play-btn { background: var(--rojo); border: none; width: 80px; height: 80px; border-radius: 50%; color: white; font-size: 30px; cursor: pointer; margin: 20px 0; }
        .vol-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }

        /* Video Section */
        .sub-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .sub-nav button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .sub-nav button.active { background: var(--rojo); }
        .video-box { display: none; width: 100%; }
        .video-box.active { display: block; }
        .iframe-container { aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--rojo); }
        iframe { width: 100%; height: 100%; border: none; }

        /* Mundial 2026 */
        .mundial-header { text-align: center; margin-bottom: 25px; }
        .mundial-card { background: #111; border: 1px solid #333; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .mundial-card-header { background: var(--rojo); padding: 12px 20px; font-weight: bold; font-size: 1.1em; display: flex; align-items: center; gap: 10px; }
        .mundial-iframe { width: 100%; border: none; display: block; }

        /* Redes */
        .grid-redes { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card-red { padding: 20px; border-radius: 10px; color: white; text-decoration: none; text-align: center; font-weight: bold; border: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Contacto */
        .form-contacto { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; max-width: 600px; margin: 0 auto; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }

        /* Flotante WhatsApp */
        .float-wa { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 1000; text-decoration: none; }
        footer { background: #000; padding: 20px; text-align: center; border-top: 2px solid var(--rojo); margin-top: 20px; font-weight: bold; }

        /* Ocultar banners en móviles */
        @media (max-width: 1100px) { .banner-side { display: none; } }
    </style>
</head>
<body>
