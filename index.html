<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Laboral Media</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #ffffff; color: #000000; }
        .header-container { text-align: center; padding: 20px 0; border-bottom: 2px solid #e50914; }
        .header-logo { font-weight: bold; font-size: 28px; color: #000000; text-transform: uppercase; }
        .header-logo span { color: #e50914; }
        .nav-menu { text-align: center; background-color: #000000; padding: 14px 0; }
        .nav-menu a { color: #ffffff; text-decoration: none; margin: 0 20px; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; }
        .tab-content { display: none; padding: 40px 20px; text-align: center; }
        .tab-content.active { display: block; }
        .page-title { font-size: 34px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; }
        
        /* Botones */
        .sidebar-buttons { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .btn-side { display: flex; align-items: center; justify-content: center; gap: 15px; color: #ffffff !important; text-decoration: none; font-size: 14px; font-weight: bold; text-transform: uppercase; padding: 18px 20px; border-radius: 6px; }
        .btn-wa { background-color: #25d366; }
        .btn-tg { background-color: #0088cc; }
        .btn-fb { background-color: #1877f2; }
        .btn-yt { background-color: #ff0000; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="header-container">
        <div class="header-logo">MUNDO <span>LABORAL</span> MEDIA</div>
    </div>

    <div class="nav-menu">
        <a onclick="showTab('radio-tab')">Radio en Vivo</a>
        <a onclick="showTab('tv-tab')">TV en Vivo</a>
        <a onclick="showTab('redes-tab')">Redes</a>
        <a onclick="showTab('contacto-tab')">Contacto</a>
    </div>

    <div id="radio-tab" class="tab-content active">
        <div class="page-title">RADIO EN VIVO</div>
        <p>Estás sintonizando Mundo Laboral Radio.</p>
    </div>

    <div id="tv-tab" class="tab-content">
        <div class="page-title">TV EN VIVO</div>
        </div>

    <div id="redes-tab" class="tab-content">
        <div class="page-title">NUESTRAS REDES</div>
        <div class="sidebar-buttons">
            <a href="#" class="btn-side btn-wa"><i class="fa-brands fa-whatsapp"></i> WhatsApp Prensa</a>
            <a href="#" class="btn-side btn-tg"><i class="fa-brands fa-telegram"></i> Telegram</a>
            <a href="#" class="btn-side btn-fb"><i class="fa-brands fa-facebook-f"></i> Facebook</a>
            <a href="#" class="btn-side btn-yt"><i class="fa-brands fa-youtube"></i> YouTube</a>
        </div>
    </div>

    <div id="contacto-tab" class="tab-content">
        <div class="page-title">CONTACTO</div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
