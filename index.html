<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio | Vallegrande 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }
        .wrapper { display: flex; justify-content: center; gap: 20px; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .container { flex: 1; max-width: 950px; }
        .seccion { display: none; width: 100%; }
        .seccion.active { display: block; }
        /* Estilo Noticia */
        .noticia-card { background: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid var(--rojo); }
        /* (El resto de tus estilos se mantienen igual) */
        @media (max-width: 1100px) { .banner-side { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('mundial')" id="btn-mundial">MUNDIAL 2026</button>
        <button onclick="ir('redes')" id="btn-redes">REDES</button>
        <button onclick="ir('noticias')" id="btn-noticias">NOTICIAS</button>
        <button onclick="ir('contacto')" id="btn-contacto">CONTACTO</button>
    </nav>
</header>

<div class="wrapper">
    <div class="container">
        <div id="noticias" class="seccion">
            <h1 style="text-align: center;">Últimas Noticias</h1>
            <div id="feed-noticias">Cargando noticias...</div>
        </div>
        
        <div id="inicio" class="seccion active"><h1>RADIO</h1></div>
        <div id="videos" class="seccion"><h1>VIDEOS</h1></div>
        </div>
</div>

<script type="module">
    import { supabase } from './supabase.js';

    // 1. Función para cargar noticias de Supabase
    window.cargarNoticias = async () => {
        const feed = document.getElementById('feed-noticias');
        feed.innerHTML = "Cargando...";

        try {
            const { data, error } = await supabase
                .from('noticias')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                feed.innerHTML = "<p>No hay noticias disponibles.</p>";
                return;
            }

            feed.innerHTML = data.map(n => `
                <div class="noticia-card">
                    <h3>${n.titulo}</h3>
                    <p>${n.contenido}</p>
                </div>
            `).join('');
        } catch (e) {
            feed.innerHTML = "Error al conectar con la base de datos.";
            console.error(e);
        }
    };

    // 2. Modificamos tu función ir(id) para que detecte cuando entras a noticias
    window.ir = function(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
        
        const seccion = document.getElementById(id);
        if(seccion) seccion.classList.add('active');
        
        const btn = document.getElementById('btn-' + id);
        if(btn) btn.classList.add('active');

        // Si entramos a noticias, llamamos a la función de Supabase
        if(id === 'noticias') {
            window.cargarNoticias();
        }
    }
</script>
</body>
</html>
