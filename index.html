<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio | Vallegrande 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }
        
        .wrapper { display: flex; justify-content: center; padding: 20px; flex: 1; }
        .container { flex: 1; max-width: 900px; }
        .seccion { display: none; } .seccion.active { display: block; }
        
        /* Tarjetas de contenido */
        .card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .card h3 { color: var(--rojo); margin-top: 0; }
        .iframe-video { width: 100%; aspect-ratio: 16/9; border-radius: 10px; border: none; }
        
        /* Grid de Redes */
        .grid-redes { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .btn-red { background: #333; padding: 15px; text-align: center; border-radius: 10px; text-decoration: none; color: white; border: 1px solid #444; }

        /* Botón Flotante */
        .float-wa { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 1000; }
        footer { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('mundial')" id="btn-mundial">MUNDIAL 2026</button>
        <button onclick="ir('redes')" id="btn-redes">REDES</button>
        <button onclick="ir('noticias')" id="btn-noticias">NOTICIAS</button>
        <button onclick="ir('contacto')" id="btn-contacto">CONTACTO</button>
    </nav>
</header>

<div class="wrapper">
    <div class="container">
        <div id="inicio" class="seccion active">
            <div class="card" style="text-align:center;">
                <h1>RADIO EN VIVO</h1>
                <button id="play-btn" onclick="toggleAudio()" style="background:var(--rojo); border:none; padding:20px 40px; border-radius:50px; color:white; font-size:20px; cursor:pointer;">
                    <i id="p-icon" class="fas fa-play"></i> Reproducir
                </button>
            </div>
        </div>

        <div id="videos" class="seccion">
            <div class="card">
                <h3>Video Destacado</h3>
                <iframe class="iframe-video" src="https://www.youtube.com/embed/TU_ID_VIDEO_AQUI"></iframe>
            </div>
        </div>

        <div id="mundial" class="seccion">
            <div class="card">
                <h3>Cobertura Mundial 2026</h3>
                <p>Próximamente contenido exclusivo sobre el Mundial.</p>
            </div>
        </div>

        <div id="redes" class="seccion">
            <div class="grid-redes">
                <a href="#" class="btn-red"><i class="fab fa-facebook"></i> Facebook</a>
                <a href="#" class="btn-red"><i class="fab fa-tiktok"></i> TikTok</a>
                <a href="#" class="btn-red"><i class="fab fa-instagram"></i> Instagram</a>
            </div>
        </div>

        <div id="noticias" class="seccion">
            <div class="card">
                <h3>Noticia 1</h3>
                <p>Aquí irá el resumen de la noticia laboral más importante del día.</p>
            </div>
        </div>

        <div id="contacto" class="seccion">
            <div class="card">
                <h3>Envíanos un mensaje</h3>
                <input type="text" placeholder="Tu Nombre" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #444; color:white;">
                <textarea placeholder="Tu mensaje" style="width:100%; padding:10px; background:#000; border:1px solid #444; color:white;"></textarea>
            </div>
        </div>
    </div>
</div>

<a href="https://wa.me/591XXXXXXXX" class="float-wa" target="_blank"><i class="fab fa-whatsapp"></i></a>

<footer>&copy; 2026 Mundo Laboral Radio</footer>

<script>
    function ir(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }
    const radio = new Audio("https://azura1.bitstreaming.net/listen/mundolaboral/radio.mp3");
    let sonando = false;
    function toggleAudio() {
        const icon = document.getElementById("p-icon");
        if (!sonando) { radio.play(); icon.className = "fas fa-pause"; sonando = true; } 
        else { radio.pause(); icon.className = "fas fa-play"; sonando = false; }
    }
</script>
</body>
</html>
