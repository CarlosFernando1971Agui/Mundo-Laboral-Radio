<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundo Laboral Media</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid #e50914; }
        .nav { text-align: center; background: #000; padding: 15px; }
        .nav a { color: #fff; margin: 0 15px; text-decoration: none; cursor: pointer; font-weight: bold; }
        .content { display: none; padding: 40px; text-align: center; }
        .content.active { display: block; }
        
        /* Video */
        .vid-box { max-width: 800px; margin: auto; }
        .vid-ratio { position: relative; padding-bottom: 56.25%; height: 0; }
        .vid-ratio iframe { position: absolute; top:0; left:0; width: 100%; height: 100%; }

        /* Grid de 8 Botones */
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 900px; margin: 20px auto; }
        .btn { padding: 15px; background: #333; color: #fff; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        .btn:hover { background: #e50914; }
    </style>
</head>
<body>

<div class="header"><h1>MUNDO <span>LABORAL</span> MEDIA</h1></div>

<div class="nav">
    <a onclick="tab('radio')">RADIO EN VIVO</a>
    <a onclick="tab('tv')">TV EN VIVO</a>
    <a onclick="tab('redes')">REDES</a>
    <a onclick="tab('contacto')">CONTACTO</a>
</div>

<div id="radio" class="content active">
    <h2>RADIO EN VIVO</h2>
    <audio controls>
        <source src="https://azura1.bitstreaming.net/listen/mundolaboral/radio.mp3" type="audio/mpeg">
    </audio>
</div>

<div id="tv" class="content">
    <h2>TV EN VIVO</h2>
    <div class="vid-box">
        <div class="vid-ratio">
            <iframe src="https://www.youtube.com/embed/videoseries?list=PLuv8v9asR76eSId_X8Ph_b9fO7UCLlY6N" allowfullscreen></iframe>
        </div>
    </div>
</div>

<div id="redes" class="content">
    <h2>NUESTRAS REDES</h2>
    <div class="btn-grid">
        <a href="#" class="btn">WhatsApp 1</a>
        <a href="#" class="btn">WhatsApp 2</a>
        <a href="#" class="btn">Telegram</a>
        <a href="#" class="btn">Facebook</a>
        <a href="#" class="btn">YouTube</a>
        <a href="#" class="btn">Instagram</a>
        <a href="#" class="btn">Twitter</a>
        <a href="#" class="btn">TikTok</a>
    </div>
</div>

<div id="contacto" class="content"><h2>CONTACTO</h2></div>

<script>
    function tab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
