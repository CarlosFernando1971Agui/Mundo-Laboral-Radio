<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; }
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        nav { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 15px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }
        .container { padding: 20px; min-height: 50vh; display: flex; justify-content: center; }
        .seccion { display: none; width: 100%; max-width: 800px; }
        .seccion.active { display: block; }
        .reproductor-card { background: #1a1a1a; border: 1px solid var(--rojo); border-radius: 20px; padding: 30px; text-align: center; }
        .tv-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .grid-redes { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .card-red { padding: 15px; border-radius: 10px; color: white; text-decoration: none; text-align: center; border: 1px solid #333; }
        .form-contacto { background: var(--gris); padding: 20px; border-radius: 15px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('redes')" id="btn-redes">REDES</button>
        <button onclick="ir('contacto')" id="btn-contacto">CONTACTO</button>
    </nav>
</header>

<div class="container">
    <div id="inicio" class="seccion active">
        <div class="reproductor-card">
            <h1>RADIO EN VIVO</h1>
            <button id="play-btn" onclick="toggleAudio()" style="background:var(--rojo); border:none; color:white; padding:20px 40px; border-radius:50px; cursor:pointer; font-size:20px;">
                <i id="p-icon" class="fas fa-play"></i>
            </button>
            <p id="status">Toca para escuchar</p>
            <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.8">
        </div>
    </div>

    <div id="videos" class="seccion">
        <div class="tv-container">
            <iframe src="https://www.youtube.com/embed/videoseries?list=PLhNUar8noPOkFDwCuMzKKuZcdNnuygyrC"></iframe>
        </div>
    </div>

    <div id="redes" class="seccion">
        <div class="grid-redes">
            <a href="https://facebook.com/MundoLaboralRadio" class="card-red" style="background:#1877F2">Facebook</a>
            <a href="https://youtube.com/@mundolaboralradiovallegrande" class="card-red" style="background:#FF0000">YouTube</a>
            <a href="https://www.tiktok.com/@carlosfer_1971" class="card-red" style="background:#000">TikTok</a>
        </div>
    </div>

    <div id="contacto" class="seccion">
        <div class="form-contacto">
            <input type="text" id="c-nombre" placeholder="Tu nombre">
            <textarea id="c-mensaje" placeholder="Tu mensaje"></textarea>
            <button onclick="enviarWA()" style="background:#25D366; color:white; border:none; padding:10px; width:100%;">ENVIAR WHATSAPP</button>
        </div>
    </div>
</div>

<script>
    function ir(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    const radio = new Audio("https://azura1.bitstreaming.net/listen/mundolaboral/radio.mp3");
    let sonando = false;

    function toggleAudio() {
        const icon = document.getElementById("p-icon");
        if (!sonando) {
            radio.play();
            icon.className = "fas fa-pause";
            document.getElementById("status").innerText = "SONANDO...";
            sonando = true;
        } else {
            radio.pause();
            icon.className = "fas fa-play";
            document.getElementById("status").innerText = "RADIO PAUSADA";
            sonando = false;
        }
    }

    function enviarWA() {
        const msg = document.getElementById('c-mensaje').value;
        window.open(`https://wa.me/59168785216?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
