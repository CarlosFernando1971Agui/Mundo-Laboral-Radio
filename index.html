<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio | Vallegrande 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }

        nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }

        .wrapper { display: flex; justify-content: center; gap: 20px; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
        
        /* Banners: Altura fija, recortados para que no se deformen */
        .banner-side { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        .banner-img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 10px; 
            border: 1px solid var(--rojo); 
            display: block; 
        }

        .container { flex: 1; max-width: 950px; }
        .seccion { display: none; width: 100%; }
        .seccion.active { display: block; }

        .reproductor-card { background: #1a1a1a; border: 1px solid var(--rojo); border-radius: 20px; padding: 50px 20px; text-align: center; }
        #play-btn { background: var(--rojo); border: none; width: 80px; height: 80px; border-radius: 50%; color: white; font-size: 30px; cursor: pointer; margin: 20px 0; }
        
        .grid-redes { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .card-red { padding: 15px; border-radius: 10px; color: white; text-decoration: none; text-align: center; font-weight: bold; border: 1px solid #333; }
        
        .card-seccion { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .iframe-container { aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        
        footer { background: #000; padding: 20px; text-align: center; border-top: 2px solid var(--rojo); }
        @media (max-width: 1100px) { .banner-side { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('mundial')" id="btn-mundial">MUNDIAL</button>
        <button onclick="ir('redes')" id="btn-redes">REDES</button>
        <button onclick="ir('noticias')" id="btn-noticias">NOTICIAS</button>
        <button onclick="ir('contacto')" id="btn-contacto">CONTACTO</button>
    </nav>
</header>

<div class="wrapper">
    <aside class="banner-side">
        <img src="https://via.placeholder.com/220x200" class="banner-img" alt="Banner">
        <img src="https://via.placeholder.com/220x200" class="banner-img" alt="Banner">
        <img src="https://via.placeholder.com/220x200" class="banner-img" alt="Banner">
    </aside>

    <div class="container">
        <div id="inicio" class="seccion active">
            <div class="reproductor-card">
                <h1>RADIO EN VIVO</h1>
                <button id="play-btn" onclick="toggleAudio()"><i id="p-icon" class="fas fa-play"></i></button>
            </div>
        </div>
        <div id="videos" class="seccion"><div class="iframe-container"><iframe src="https://www.youtube.com/embed/videoseries?list=PLhNUar8noPOkFDwCuMzKKuZcdNnuygyrC"></iframe></div></div>
        <div id="mundial" class="seccion"><div class="iframe-container"><iframe src="https://www.sportbusy.com/embed/world-cup"></iframe></div></div>
        <div id="redes" class="seccion"><div class="grid-redes"><a href="#" class="card-red">Web</a><a href="#" class="card-red">Facebook</a><a href="#" class="card-red">TikTok</a><a href="#" class="card-red">Instagram</a><a href="#" class="card-red">WhatsApp</a><a href="#" class="card-red">Telegram</a><a href="#" class="card-red">YouTube</a><a href="#" class="card-red">App</a></div></div>
        <div id="noticias" class="seccion"><div class="card-seccion"><h2>Noticias</h2><p>Contenido de noticias aquí.</p></div></div>
        <div id="contacto" class="seccion"><div class="card-seccion"><h2>Contacto</h2><input type="text" id="c-nombre" placeholder="Nombre" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #444; color:#fff;"><textarea id="c-mensaje" rows="4" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #444; color:#fff;"></textarea><button onclick="enviarWA()" style="width:100%; padding:15px; background:var(--rojo); color:white; border:none; cursor:pointer;">ENVIAR</button></div></div>
    </div>
</div>

<script>
    function ir(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }
    const radio = new Audio("https://azura1.bitstreaming.net/listen/mundolaboral/radio.mp3");
    let sonando = false;
    function toggleAudio() {
        const icon = document.getElementById("p-icon");
        if (!sonando) { radio.play(); icon.className = "fas fa-pause"; sonando = true; } 
        else { radio.pause(); icon.className = "fas fa-play"; sonando = false; }
    }
    function enviarWA() {
        const msg = document.getElementById('c-mensaje').value;
        const nombre = document.getElementById('c-nombre').value;
        if(nombre && msg) window.open(`https://wa.me/59168785216?text=Hola soy ${nombre}, ${encodeURIComponent(msg)}`, '_blank');
        else alert("Completa tu nombre y mensaje.");
    }
</script>
</body>
</html>
