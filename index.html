<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio | Vallegrande 2026</title>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; }
        
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }

        /* Nueva estructura de diseño */
        .main-layout { display: flex; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 15px; }
        
        /* Sidebar (Izquierda) */
        .sidebar { width: 250px; flex-shrink: 0; display: flex; flex-direction: column; gap: 20px; }
        .widget-box { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        #clock { font-size: 1.5em; font-weight: bold; color: var(--rojo); margin-top: 10px; }
        
        /* Contenido Principal (Derecha) */
        .content-area { flex-grow: 1; }
        
        /* Responsivo: Si la pantalla es pequeña, la sidebar va arriba */
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
</header>

<div class="main-layout">
    <aside class="sidebar">
        <div class="widget-box">
            <h3>Hora</h3>
            <div id="clock">00:00:00</div>
        </div>
        <div class="widget-box">
            <h3>Clima</h3>
            <a class="weatherwidget-io" href="https://forecast7.com/es/-1847-6410/vallegrande/" data-label_1="VALLEGRANDE" data-theme="dark" >VALLEGRANDE</a>
            <script>
                !function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io');
            </script>
        </div>
    </aside>

    <main class="content-area">
        <div style="background: #1a1a1a; padding: 50px; border-radius: 20px; border: 1px solid var(--rojo); text-align: center;">
            <h2>Bienvenidos a Mundo Laboral Radio</h2>
            <p>Selecciona una opción del menú para comenzar.</p>
        </div>
    </main>
</div>

<script>
    // Función para el reloj
    function updateClock() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('es-ES');
        document.getElementById('clock').textContent = timeString;
    }
    setInterval(updateClock, 1000);
    updateClock(); // Llamada inicial
</script>

</body>
</html>
