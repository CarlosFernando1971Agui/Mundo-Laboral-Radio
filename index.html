<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio | Vallegrande 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }

        nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }

        .main-wrapper { display: flex; justify-content: center; gap: 20px; padding: 20px; flex: 1; align-items: flex-start; }
        .banner-side { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        
        /* CORRECCIÓN: Todas las imágenes tendrán el mismo tamaño visual */
        .banner-img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; border: 1px solid #444; display: block; }

        .container { flex: 1; max-width: 800px; }
        .seccion { display: none; width: 100%; }
        .seccion.active { display: block; }

        /* Estilos de elementos */
        .reproductor-card { background: #1a1a1a; border: 1px solid var(--rojo); border-radius: 20px; padding: 40px; text-align: center; }
        #play-btn { background: var(--rojo); border: none; width: 70px; height: 70px; border-radius: 50%; color: white; cursor: pointer; font-size: 24px; }
        .iframe-container { aspect-ratio: 16/9; width: 100%; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid var(--rojo); }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Grid Redes */
        .grid-redes { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .card-red { padding: 15px; border-radius: 10px; color: white; text-decoration: none; text-align: center; border: 1px solid #333; background: #222; }

        .float-wa { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 9999; text-decoration: none; }
        footer { text-align: center; padding: 20px; color: #666; }
        
        @media (max-width: 900px) { .banner-side { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('mundial')" id="btn-mundial">MUNDIAL 2026</button>
        <button onclick="ir('redes')" id="btn-redes">REDES</button>
        <button onclick="ir('contacto')" id="btn-contacto">CONTACTO</button>
    </nav>
</header>

<div class="main-wrapper">
    <aside class="banner-side">
        <img src="https://i.postimg.cc/pXXhQsW4/232310560-401062984939201-7897983293061993896-n.png" class="banner-img" alt="Banner">
        <img src="https://i.postimg.cc/sDDQPTfd/ags.jpg" class="banner-img" alt="Banner">
        <img src="https://i.postimg.cc/wTTy5wqP/Imagen-de-Whats-App-2024-02-18-a-las-13-11-48-5cb62194.jpg" class="banner-img" alt="Banner">
    </aside>

    <div class="container">
        <div id="inicio" class="seccion active">
            <div class="reproductor-card">
                <h1>RADIO EN VIVO</h1>
                <button id="play-btn" onclick="toggleAudio()"><i id="p-icon" class="fas fa-play"></i></button>
            </div>
        </div>

        <div id="videos" class="seccion">
            <div class="iframe-container"><iframe src="https://www.youtube.com/embed/videoseries?list=PLhNUar8noPOkFDwCuMzKKuZcdNnuygyrC"></iframe></div>
        </div>

        <div id="mundial" class="seccion">
            <div class="iframe-container"><iframe src="https://www.sportbusy.com/embed/world-cup"></iframe></div>
        </div>

        <div id="redes" class="seccion">
            <div class="grid-redes">
                <a href="#" class="card-red">Web</a>
                <a href="#" class="card-red">Facebook</a>
            </div>
        </div>

        <div id="contacto" class="seccion">
            <div style="background:#1a1a1a; padding:20px; border-radius:10px;">
                <input type="text" id="c-nombre" placeholder="Nombre" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #444;">
                <textarea id="c-mensaje" rows="4" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid #444;"></textarea>
                <button onclick="enviarWA()" style="width:100%; padding:15px; margin-top:10px; background:var(--rojo); color:white; border:none; cursor:pointer;">ENVIAR</button>
            </div>
        </div>
    </div>

    <aside class="banner-side">
        <img src="https://i.postimg.cc/PrrpbSXg/Logotipo-2020-CST.jpg" class="banner-img" alt="Banner">
        <img src="https://i.postimg.cc/288bd0jp/publi-fija-junio.jpg" class="banner-img" alt="Banner">
        <img src="https://i.postimg.cc/yYYghL6C/Sin-titulo.jpg" class="banner-img" alt="Banner">
    </aside>
</div>

<a href="https://wa.me/59168785216" class="float-wa"><i class="fab fa-whatsapp"></i></a>

<script>
    function ir(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    const radio = new Audio("https://azura1.bitstreaming.net/listen/mundolaboral/radio.mp3");
    let sonando = false;
    function toggleAudio() {
        const icon = document.getElementById("p-icon");
        if (!sonando) { radio.play(); icon.className = "fas fa-pause"; sonando = true; } 
        else { radio.pause(); icon.className = "fas fa-play"; sonando = false; }
    }

    function enviarWA() {
        const nombre = document.getElementById('c-nombre').value;
        const msg = document.getElementById('c-mensaje').value;
        window.open(`https://wa.me/59168785216?text=Hola soy ${nombre}, ${msg}`, '_blank');
    }
</script>
</body>
</html>
