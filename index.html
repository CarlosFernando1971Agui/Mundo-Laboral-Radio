<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="google-site-verification" content="bXy22qdr53vBBWkwyqL8L9t_KvFa9Jnvnji196K1P5Q" />
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; }
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        nav { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }
        .container { padding: 20px; min-height: 60vh; display: flex; justify-content: center; }
        .seccion { display: none; width: 100%; max-width: 1000px; animation: fadeIn 0.3s; }
        .seccion.active { display: block; }
        
        .reproductor-card { background: #1a1a1a; border: 1px solid var(--rojo); border-radius: 20px; padding: 40px; text-align: center; }
        #play-btn { background: var(--rojo); border: none; width: 80px; height: 80px; border-radius: 50%; color: white; font-size: 30px; cursor: pointer; margin: 20px 0; }
        
        /* Contenedor del video que mostrará tu directo */
        .tv-container { width: 100%; aspect-ratio: 16 / 9; border-radius: 15px; border: 1px solid var(--rojo); overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .grid-redes { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card-red { padding: 20px; border-radius: 12px; text-decoration: none; color: white; text-align: center; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 8px; border: 1px solid #333; }
        .card-red:hover { background: rgba(255,255,255,0.1); }
        .whatsapp-float { position: fixed; bottom: 25px; right: 25px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; z-index: 999; text-decoration: none; }
    </style>
</head>
<body>

<a href="https://wa.me/59168785216" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('redes')" id="btn-redes">REDES</button>
        <button onclick="ir('contacto')" id="btn-contacto">CONTACTO</button>
    </nav>
</header>

<div class="container">
    <div id="inicio" class="seccion active">
        <div class="reproductor-card">
            <h1>RADIO EN VIVO</h1>
            <button id="play-btn" onclick="toggleAudio()"><i id="p-icon" class="fas fa-play"></i></button>
            <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
                <i class="fas fa-volume-up"></i>
                <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>
    </div>

    <div id="videos" class="seccion">
        <h2 style="text-align:center;">TV EN VIVO</h2>
        <div class="tv-container">
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UC_TU_ID_DE_CANAL_AQUI&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div id="redes" class="seccion">
        <div class="grid-redes">
            </div>
    </div>
</div>

<script>
    function ir(seccionId) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.getElementById(seccionId).classList.add('active');
    }
    // (Tu script de audio original)
</script>
</body>
</html>
