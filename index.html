<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio | Vallegrande</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; }
        
        /* Banners Laterales */
        .banner-lateral { position: fixed; top: 120px; width: 150px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
        .banner-left { left: 10px; }
        .banner-right { right: 10px; }
        .banner-lateral img { width: 100%; border-radius: 8px; border: 1px solid #333; }
        @media (max-width: 1350px) { .banner-lateral { display: none; } }

        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        
        nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }
        
        .container { padding: 20px; min-height: 500px; display: flex; justify-content: center; }
        .seccion { display: none; width: 100%; max-width: 950px; }
        .seccion.active { display: block; }
        
        /* Reproductor Radio */
        .reproductor-card { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=800&auto=format&fit=crop'); background-size: cover; background-position: center; border: 1px solid var(--rojo); border-radius: 20px; padding: 50px 20px; text-align: center; }
        #play-btn { background: var(--rojo); border: none; width: 80px; height: 80px; border-radius: 50%; color: white; font-size: 30px; cursor: pointer; margin: 20px 0; }
        
        /* Videos */
        .video-landing { text-align: center; padding: 40px 20px; }
        .btn-vid-action { display: block; width: 100%; max-width: 800px; margin: 15px auto; padding: 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 16px; text-transform: uppercase; }
        .btn-live { background: var(--rojo); }
        .btn-list { background: #333; }
        .iframe-container { aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 1px solid var(--rojo); background:#000; margin-top:20px; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Redes - Funcionales */
        .grid-redes { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card-red { padding: 20px; border-radius: 10px; color: white; text-decoration: none; text-align: center; font-weight: bold; border: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.1em; transition: 0.3s; }
        .card-red:hover { opacity: 0.8; }
        
        /* Contacto */
        .form-contacto { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; max-width: 600px; margin: 0 auto; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        
        /* Footer y WhatsApp */
        footer { text-align: center; padding: 20px; color: #666; font-size: 15px; border-top: 1px solid #333; margin-top: 40px; }
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; padding: 15px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('redes')" id="btn-redes">REDES</button>
        <button onclick="ir('contacto')" id="btn-contacto">CONTACTO</button>
    </nav>
</header>

<div class="container">
    <!-- RADIO -->
    <div id="inicio" class="seccion active">
        <div class="reproductor-card">
            <h1>RADIO EN VIVO</h1>
            <p>Vallegrande, Bolivia</p>
            <button id="play-btn" onclick="toggleAudio()"><i id="p-icon" class="fas fa-play"></i></button>
            <p id="status">Toca para escuchar</p>
        </div>
    </div>

    <!-- VIDEOS -->
    <div id="videos" class="seccion">
        <div id="videos-landing" class="video-landing">
            <h2>¿Estamos transmitiendo?</h2>
            <button class="btn-vid-action btn-live" onclick="loadVideo('live')">HAGA CLIC PARA VER EN VIVO</button>
            <button class="btn-vid-action btn-list" onclick="loadVideo('list')">VER LISTA DE VIDEOS</button>
        </div>
        <div id="videos-player" class="iframe-container" style="display:none;">
            <div style="padding:10px; background:#000;">
                <button onclick="backToLanding()" style="background:#444; color:white; border:none; padding:8px 15px; cursor:pointer; border-radius:5px;"><i class="fas fa-arrow-left"></i> Volver</button>
            </div>
            <iframe id="iframe-src" src=""></iframe>
        </div>
    </div>

    <!-- REDES -->
    <div id="redes" class="seccion">
        <div class="grid-redes">
            <!-- Web oficial -->
            <a href="https://mundolaboral.radio.com.bo" target="_blank" class="card-red" style="background:#444"><i class="fas fa-globe"></i> WEB</a>
            <a href="#" target="_blank" class="card-red" style="background:#1877F2"><i class="fab fa-facebook"></i> FACEBOOK</a>
            <a href="#" target="_blank" class="card-red" style="background:#FF0000"><i class="fab fa-youtube"></i> YOUTUBE</a>
            <a href="#" target="_blank" class="card-red" style="background:#000000"><i class="fab fa-tiktok"></i> TIKTOK</a>
            <a href="#" target="_blank" class="card-red" style="background:#E1306C"><i class="fab fa-instagram"></i> INSTAGRAM</a>
            <a href="#" target="_blank" class="card-red" style="background:#1DA1F2"><i class="fab fa-x-twitter"></i> X (TWITTER)</a>
            <a href="#" target="_blank" class="card-red" style="background:#25D366"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
            <!-- Link a Play Store -->
            <a href="https://play.google.com/store/apps/details?id=mundo.laboralradio2" target="_blank" class="card-red" style="background:#4285F4"><i class="fab fa-google-play"></i> APP PLAY STORE</a>
        </div>
    </div>

    <!-- CONTACTO -->
    <div id="contacto" class="seccion">
        <div class="form-contacto">
            <h2>Contacto</h2>
            <input type="text" placeholder="Tu nombre">
            <textarea rows="5" placeholder="Tu mensaje"></textarea>
            <button style="background:var(--rojo); color:white; border:none; padding:15px; width:100%; border-radius:8px; cursor:pointer;">ENVIAR</button>
        </div>
    </div>
</div>

<footer>Mundo Laboral Radio. Vallegrande 2026</footer>

<a href="https://wa.me/59170000000" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>

<script>
    function ir(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function loadVideo(tipo) {
        const landing = document.getElementById('videos-landing');
        const player = document.getElementById('videos-player');
        const iframe = document.getElementById('iframe-src');
        landing.style.display = 'none';
        player.style.display = 'block';
        if (tipo === 'live') {
            iframe.src = "https://www.youtube.com/embed/live_stream?channel=UCUJY-xgeGJokDh-5Ho_Wb9A";
        } else {
            iframe.src = "https://www.youtube.com/embed/videoseries?list=PLhNUar8noPOkFDwCuMzKKuZcdNnuygyrC";
        }
    }

    function backToLanding() {
        document.getElementById('videos-landing').style.display = 'block';
        document.getElementById('videos-player').style.display = 'none';
        document.getElementById('iframe-src').src = "";
    }

    const radio = new Audio("https://azura1.bitstreaming.net/listen/mundolaboral/radio.mp3");
    let sonando = false;
    function toggleAudio() {
        const icon = document.getElementById("p-icon");
        if (!sonando) { radio.play(); icon.className = "fas fa-pause"; sonando = true; } 
        else { radio.pause(); icon.className = "fas fa-play"; sonando = false; }
    }
</script>
</body>
</html>
