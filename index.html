<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }
        .container { flex: 1; padding: 20px; display: flex; justify-content: center; }
        .seccion { display: none; width: 100%; max-width: 950px; }
        .seccion.active { display: block; }
        
        .reproductor-card { background: #1a1a1a; border: 1px solid var(--rojo); border-radius: 20px; padding: 40px; text-align: center; }
        #play-btn { background: var(--rojo); border: none; width: 80px; height: 80px; border-radius: 50%; color: white; font-size: 30px; cursor: pointer; margin: 20px 0; }
        
        .tv-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--rojo); }
        iframe { width: 100%; height: 100%; border: none; }
        
        .countdown-box { background: #16161d; border: 1px solid var(--rojo); padding: 30px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        #contadorMundial { font-size: 2em; font-weight: bold; color: var(--rojo); margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('mundial')" id="btn-mundial">MUNDIAL 2026</button>
    </nav>
</header>

<div class="container">
    <div id="inicio" class="seccion active">
        <div class="reproductor-card">
            <h1>RADIO EN VIVO</h1>
            <button id="play-btn" onclick="toggleAudio()"><i id="p-icon" class="fas fa-play"></i></button>
            <p id="status">Toca para escuchar</p>
        </div>
    </div>

    <div id="videos" class="seccion">
        <h2 style="text-align: center;">Transmisión en Vivo</h2>
        <div class="tv-container">
            <iframe src="https://www.youtube.com/embed/live_stream?channel=UCUJY-xgeGJokDh-5Ho_Wb9A" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <div id="mundial" class="seccion">
        <div class="countdown-box">
            <h3>Falta para el inicio de la fiesta mundialista</h3>
            <div id="contadorMundial">Calculando...</div>
        </div>
        <div style="text-align: center; padding: 20px;">
            <p>El centro de estadísticas se activará automáticamente al inicio del torneo.</p>
            <a href="https://www.fifa.com/fifaplus/es/tournaments/mens/worldcup/canadamexicousa2026" target="_blank" style="background: var(--rojo); color: white; padding: 15px 30px; text-decoration: none; border-radius: 8px; font-weight: bold;">IR AL SITIO OFICIAL FIFA</a>
        </div>
    </div>
</div>

<script>
    // Navegación
    function ir(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    // Audio
    const radio = new Audio("https://azura1.bitstreaming.net/listen/mundolaboral/radio.mp3");
    let sonando = false;
    function toggleAudio() {
        const icon = document.getElementById("p-icon");
        if (!sonando) {
            radio.play();
            icon.className = "fas fa-pause";
            sonando = true;
        } else {
            radio.pause();
            icon.className = "fas fa-play";
            sonando = false;
        }
    }

    // Cronómetro
    const fechaMundial = new Date("2026-06-11T00:00:00").getTime();
    setInterval(() => {
        const ahora = new Date().getTime();
        const diff = fechaMundial - ahora;
        const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
        const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById("contadorMundial").innerHTML = `${dias} DÍAS ${horas} HORAS`;
    }, 1000);
</script>
</body>
</html>
