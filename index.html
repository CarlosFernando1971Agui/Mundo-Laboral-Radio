<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Laboral Media</title>
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #ffffff; color: #000000; }
        .header-container { text-align: center; padding: 20px 0; border-bottom: 2px solid #e50914; }
        .header-logo { font-weight: bold; font-size: 28px; color: #000000; text-transform: uppercase; }
        .header-logo span { color: #e50914; }
        .nav-menu { text-align: center; background-color: #000000; padding: 14px 0; }
        .nav-menu a { color: #ffffff; text-decoration: none; margin: 0 20px; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; }
        
        .tab-content { display: none; padding: 40px 20px; text-align: center; }
        .tab-content.active { display: block; }
        .page-title { font-size: 34px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; }
        
        /* Contenedor de video simple y limpio */
        .video-container { max-width: 800px; margin: 0 auto; }
        .responsive-video { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .responsive-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* Botones de Redes (Estilo grilla) */
        .redes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
        .btn-red { display: block; padding: 15px; background: #333; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .btn-red:hover { background: #e50914; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-logo">MUNDO <span>LABORAL</span> MEDIA</div>
    </div>

    <div class="nav-menu">
        <a onclick="showTab('radio-tab')">Radio en Vivo</a>
        <a onclick="showTab('tv-tab')">TV en Vivo</a>
        <a onclick="showTab('redes-tab')">Redes</a>
        <a onclick="showTab('contacto-tab')">Contacto</a>
    </div>

    <div id="radio-tab" class="tab-content active">
        <div class="page-title">RADIO EN VIVO</div>
        <p>Estás sintonizando Mundo Laboral Radio.</p>
    </div>

    <div id="tv-tab" class="tab-content">
        <div class="page-title">TV EN VIVO</div>
        <div class="video-container">
            <div class="responsive-video">
                <iframe src="https://www.youtube.com/embed/videoseries?list=TU_ID_DE_LISTA_AQUI" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div id="redes-tab" class="tab-content">
        <div class="page-title">NUESTRAS REDES</div>
        <div class="redes-grid">
            <a href="#" class="btn-red">WhatsApp 1</a>
            <a href="#" class="btn-red">WhatsApp 2</a>
            <a href="#" class="btn-red">Telegram</a>
            <a href="#" class="btn-red">Facebook</a>
            <a href="#" class="btn-red">YouTube</a>
            <a href="#" class="btn-red">Instagram</a>
            <a href="#" class="btn-red">Twitter</a>
            <a href="#" class="btn-red">TikTok</a>
        </div>
    </div>

    <div id="contacto-tab" class="tab-content">
        <div class="page-title">CONTACTO</div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
