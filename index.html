<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio | Vallegrande 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }
        .container { flex: 1; padding: 20px; display: flex; justify-content: center; }
        .seccion { display: none; width: 100%; max-width: 950px; }
        .seccion.active { display: block; }
        
        /* Radio */
        .reproductor-card { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=800&auto=format&fit=crop'); background-size: cover; background-position: center; border: 1px solid var(--rojo); border-radius: 20px; padding: 50px 20px; text-align: center; }
        #play-btn { background: var(--rojo); border: none; width: 80px; height: 80px; border-radius: 50%; color: white; font-size: 30px; cursor: pointer; margin: 20px 0; }
        .vol-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
        
        /* Video Section */
        .sub-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .sub-nav button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .sub-nav button.active { background: var(--rojo); }
        .video-box { display: none; width: 100%; }
        .video-box.active { display: block; }
        .iframe-container { aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--rojo); }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Mundial 2026 */
        .mundial-header { text-align: center; margin-bottom: 25px; }
        .mundial-card { background: #111; border: 1px solid #333; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .mundial-card-header { background: var(--rojo); padding: 12px 20px; font-weight: bold; font-size: 1.1em; display: flex; align-items: center; gap: 10px; }
        .mundial-iframe { width: 100%; border: none; display: block; }

        /* Redes */
        .grid-redes { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card-red { padding: 20px; border-radius: 10px; color: white; text-decoration: none; text-align: center; font-weight: bold; border: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Contacto */
        .form-contacto { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; max-width: 600px; margin: 0 auto; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        
        .float-wa { position: fixed; bottom: 30px; right: 30px; background: #25D366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 1000; text-decoration: none; }
        footer { background: #000; padding: 20px; text-align: center; border-top: 2px solid var(--rojo); margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('mundial')" id="btn-mundial">MUNDIAL 2026</button>
        <button onclick="ir('redes')" id="btn-redes">REDES</button>
        <button onclick="ir('contacto')" id="btn-contacto">CONTACTO</button>
    </nav>
</header>

<div class="container">
    <div id="inicio" class="seccion active">
        <div class="reproductor-card">
            <h1>RADIO EN VIVO</h1>
            <button id="play-btn" onclick="toggleAudio()"><i id="p-icon" class="fas fa-play"></i></button>
            <p id="status">Toca para escuchar</p>
        </div>
    </div>

    <div id="videos" class="seccion">
        <div class="sub-nav">
            <button onclick="cambiarVideo('clasico')" id="sub-btn-clasico" class="active">CLÁSICOS</button>
            <button onclick="cambiarVideo('live')" id="sub-btn-live">TRANSMISIÓN EN VIVO</button>
        </div>
        <div id="clasico-box" class="video-box active">
            <div class="iframe-container">
                <iframe src="https://www.youtube.com/embed/videoseries?list=PLhNUar8noPOkFDwCuMzKKuZcdNnuygyrC" allowfullscreen></iframe>
            </div>
        </div>
        <div id="live-box" class="video-box">
            <div class="iframe-container">
                <iframe id="frame-live" src="https://www.youtube.com/embed/live_stream?channel=UCUJY-xgeGJokDh-5Ho_Wb9A" allowfullscreen></iframe>
            </div>
            <p style="text-align:center; color:#888; font-size:0.9em; margin-top:10px;">Si aparece "Video no disponible", el canal no está transmitiendo en vivo en este momento.</p>
            <a href="https://www.youtube.com/@mundolaboralradio/live" target="_blank" rel="noopener noreferrer" style="display:block; text-align:center; color:var(--rojo); font-weight:bold; margin-top:5px;">Ver directamente en YouTube</a>
        </div>
    </div>

    <div id="mundial" class="seccion">
        <div class="sub-nav">
            <button onclick="cambiarMundial('partidos')" id="sub-btn-partidos" class="active">PARTIDOS</button>
            <button onclick="cambiarMundial('tabla')" id="sub-btn-tabla">TABLA DE POSICIONES</button>
        </div>
        <div id="mundial-partidos" class="video-box active">
            <iframe class="mundial-iframe" src="https://www.sportbusy.com/embed/world-cup" height="500"></iframe>
        </div>
        <div id="mundial-tabla" class="video-box">
            <iframe class="mundial-iframe" src="https://www.sportbusy.com/widget/standings/?league=world-cup" height="500"></iframe>
        </div>
    </div>

    <div id="redes" class="seccion">
        <div class="grid-redes">
            <a href="https://mundolaboral.radio.com.bo/" target="_blank" rel="noopener noreferrer" class="card-red" style="background:#444">WEB</a>
            <a href="https://facebook.com/MundoLaboralRadio" target="_blank" rel="noopener noreferrer" class="card-red" style="background:#1877F2">FACEBOOK</a>
            <a href="https://www.youtube.com/@mundolaboralradio" target="_blank" rel="noopener noreferrer" class="card-red" style="background:#FF0000">YOUTUBE</a>
        </div>
    </div>
</div>

<a href="https://wa.me/59168785216" class="float-wa" target="_blank" rel="noopener noreferrer"><i class="fab fa-whatsapp"></i></a>

<script>
    function ir(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }
    function cambiarVideo(tipo) {
        document.querySelectorAll('.video-box').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
        if(tipo === 'clasico') { document.getElementById('clasico-box').classList.add('active'); document.getElementById('sub-btn-clasico').classList.add('active'); } 
        else { document.getElementById('live-box').classList.add('active'); document.getElementById('sub-btn-live').classList.add('active'); }
    }
    function cambiarMundial(tipo) {
        document.querySelectorAll('#mundial .video-box').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('#mundial .sub-nav button').forEach(b => b.classList.remove('active'));
        if(tipo === 'partidos') { document.getElementById('mundial-partidos').classList.add('active'); document.getElementById('sub-btn-partidos').classList.add('active'); } 
        else { document.getElementById('mundial-tabla').classList.add('active'); document.getElementById('sub-btn-tabla').classList.add('active'); }
    }
    const radio = new Audio("https://azura1.bitstreaming.net/listen/mundolaboral/radio.mp3");
    let sonando = false;
    function toggleAudio() {
        const icon = document.getElementById("p-icon");
        const status = document.getElementById("status");
        if (!sonando) { radio.play(); icon.className = "fas fa-pause"; status.innerText = "SONANDO..."; sonando = true; } 
        else { radio.pause(); icon.className = "fas fa-play"; status.innerText = "Toca para escuchar"; sonando = false; }
    }
</script>
</body>
</html>
