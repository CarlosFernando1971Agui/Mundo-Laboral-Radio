<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio | Vallegrande 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }

        nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }

        .wrapper { display: flex; justify-content: center; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .container { flex: 1; max-width: 950px; }
        .seccion { display: none; width: 100%; }
        .seccion.active { display: block; }
        
        /* Reproductor */
        .reproductor-card { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=800&auto=format&fit=crop'); background-size: cover; border: 1px solid var(--rojo); border-radius: 20px; padding: 40px; text-align: center; }
        #play-btn { background: var(--rojo); border: none; width: 80px; height: 80px; border-radius: 50%; color: white; font-size: 30px; cursor: pointer; }
        
        /* Videos */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; border: 1px solid #333; }
        
        /* Redes - Corregido para que se vean bien */
        .grid-redes { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .card-red { background: #1a1a1a; padding: 20px; border-radius: 10px; color: white; text-decoration: none; text-align: center; border: 1px solid #444; transition: 0.3s; }
        .card-red:hover { background: var(--rojo); border-color: var(--rojo); }

        /* Contacto - Estilo limpio */
        .form-contacto { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .btn-enviar { background: var(--rojo); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        
        footer { background: #000; padding: 20px; text-align: center; border-top: 2px solid var(--rojo); }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('mundial')" id="btn-mundial">MUNDIAL 2026</button>
        <button onclick="ir('redes')" id="btn-redes">REDES</button>
        <button onclick="ir('contacto')" id="btn-contacto">CONTACTO</button>
    </nav>
</header>

<div class="wrapper">
    <div class="container">
        <div id="inicio" class="seccion active">
            <div class="reproductor-card">
                <h1>RADIO EN VIVO</h1>
                <button id="play-btn" onclick="toggleAudio()"><i id="p-icon" class="fas fa-play"></i></button>
            </div>
        </div>
        
        <div id="videos" class="seccion">
            <h2>Videos Destacados</h2>
            <div class="video-container">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/tu-video-id" allowfullscreen></iframe>
            </div>
        </div>

        <div id="mundial" class="seccion">
            <h2>Mundial 2026</h2>
            <div style="background:#1a1a1a; padding:20px; border-radius:15px; border:1px solid #333;">
                <p>Aquí tienes la información del mundial organizada.</p>
            </div>
        </div>

        <div id="redes" class="seccion">
            <h2>Síguenos</h2>
            <div class="grid-redes">
                <a href="#" class="card-red"><i class="fab fa-facebook fa-2x"></i><br>Facebook</a>
                <a href="#" class="card-red"><i class="fab fa-tiktok fa-2x"></i><br>TikTok</a>
                <a href="#" class="card-red"><i class="fab fa-instagram fa-2x"></i><br>Instagram</a>
                <a href="#" class="card-red"><i class="fab fa-youtube fa-2x"></i><br>YouTube</a>
                <a href="#" class="card-red"><i class="fab fa-twitter fa-2x"></i><br>Twitter</a>
                <a href="#" class="card-red"><i class="fab fa-linkedin fa-2x"></i><br>LinkedIn</a>
                <a href="#" class="card-red"><i class="fab fa-twitch fa-2x"></i><br>Twitch</a>
                <a href="#" class="card-red"><i class="fab fa-telegram fa-2x"></i><br>Telegram</a>
            </div>
        </div>

        <div id="contacto" class="seccion">
            <h2>Contáctanos</h2>
            <div class="form-contacto">
                <input type="text" placeholder="Tu Nombre" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #444; color:white;">
                <textarea placeholder="Tu mensaje" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #444; color:white;" rows="5"></textarea>
                <button class="btn-enviar">ENVIAR MENSAJE</button>
            </div>
        </div>
    </div>
</div>

<script>
    function ir(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('#main-nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }
    const radio = new Audio("https://azura1.bitstreaming.net/listen/mundolaboral/radio.mp3");
    let sonando = false;
    function toggleAudio() {
        const icon = document.getElementById("p-icon");
        if (!sonando) { radio.play(); icon.className = "fas fa-pause"; sonando = true; } 
        else { radio.pause(); icon.className = "fas fa-play"; sonando = false; }
    }
</script>
</body>
</html>
