<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mundo Laboral Radio | Vallegrande 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <style>
        :root { --rojo: #ff4d4d; --negro: #0d0d11; --gris: #16161d; --texto: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--negro); color: var(--texto); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #000; padding: 25px 0; border-bottom: 2px solid var(--rojo); text-align: center; }
        .brand-name { font-size: 30px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }

        nav { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; padding: 0 10px; }
        nav button { background: var(--gris); border: 1px solid #333; color: #fff; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav button.active { background: var(--rojo); border-color: var(--rojo); }

        .wrapper { display: flex; justify-content: center; gap: 20px; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .banner-side { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
        
        /* CORRECCIÓN DE IMÁGENES */
        .banner-img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; border: 1px solid var(--rojo); display: block; }

        .container { flex: 1; max-width: 950px; }
        .seccion { display: none; width: 100%; }
        .seccion.active { display: block; }

        /* Reproductor Radio */
        .reproductor-card { background: #111; border: 1px solid var(--rojo); border-radius: 20px; padding: 40px 20px; text-align: center; }
        #play-btn { background: var(--rojo); border: none; width: 80px; height: 80px; border-radius: 50%; color: white; font-size: 30px; cursor: pointer; margin: 20px 0; }
        
        /* Video Section */
        .sub-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .sub-nav button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .sub-nav button.active { background: var(--rojo); }
        .video-box { display: none; width: 100%; }
        .video-box.active { display: block; }
        .iframe-container { aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--rojo); }
        iframe { width: 100%; height: 100%; border: none; }

        /* Redes */
        .grid-redes { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .card-red { padding: 15px; border-radius: 10px; color: white; text-decoration: none; text-align: center; font-weight: bold; border: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9em; }

        /* Contacto */
        .form-contacto { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }

        @media (max-width: 1000px) { .banner-side { display: none; } }
    </style>
</head>
<body>

<header>
    <div class="brand-name">MUNDO <span style="color:var(--rojo)">LABORAL</span> RADIO</div>
    <nav id="main-nav">
        <button onclick="ir('inicio')" id="btn-inicio" class="active">RADIO</button>
        <button onclick="ir('videos')" id="btn-videos">VIDEOS</button>
        <button onclick="ir('mundial')" id="btn-mundial">MUNDIAL 2026</button>
        <button onclick="ir('redes')" id="btn-redes">REDES</button>
        <button onclick="ir('noticias')" id="btn-noticias">NOTICIAS</button>
        <button onclick="ir('contacto')" id="btn-contacto">CONTACTO</button>
    </nav>
</header>

<div class="wrapper">
    <aside class="banner-side">
        <img src="https://i.postimg.cc/sxpnYN19/ags.jpg" class="banner-img" alt="Ad">
        <img src="https://i.postimg.cc/NfcCsBPN/publi-fija-junio.jpg" class="banner-img" alt="Ad">
        <img src="https://i.postimg.cc/HkPtygBT/232310560-401062984939201-7897983293061993896-n.png" class="banner-img" alt="Ad">
    </aside>

    <div class="container">
        <div id="inicio" class="seccion active">
            <div class="reproductor-card">
                <h1>RADIO EN VIVO</h1>
                <button id="play-btn" onclick="toggleAudio()"><i id="p-icon" class="fas fa-play"></i></button>
                <p id="status">Toca para escuchar</p>
            </div>
        </div>

        <div id="videos" class="seccion">
            <div class="sub-nav">
                <button onclick="cambiarVideo('clasico')" id="sub-btn-clasico" class="active">CLÁSICOS</button>
                <button onclick="cambiarVideo('live')" id="sub-btn-live">EN VIVO</button>
            </div>
            <div id="clasico-box" class="video-box active">
                <div class="iframe-container"><iframe src="https://www.youtube.com/embed/videoseries?list=PLhNUar8noPOkFDwCuMzKKuZcdNnuygyrC"></iframe></div>
            </div>
            <div id="live-box" class="video-box">
                <div class="iframe-container"><iframe id="frame-live" src="https://www.youtube.com/embed/live_stream?channel=UCUJY-xgeGJokDh-5Ho_Wb9A"></iframe></div>
            </div>
        </div>

        <div id="mundial" class="seccion">
            <h1>Mundial 2026</h1>
            <iframe style="width:100%; height:600px; border:none;" src="https://www.sportbusy.com/embed/world-cup"></iframe>
        </div>

        <div id="redes" class="seccion">
            <div class="grid-redes">
                <a href="https://mundolaboral.radio.com.bo/" class="card-red" style="background:#444"><i class="fas fa-globe"></i> Web</a>
                <a href="https://play.google.com/store/apps/details?id=mundo.laboralradio2" class="card-red" style="background:#34a853"><i class="fab fa-google-play"></i> App</a>
                <a href="https://facebook.com/MundoLaboralRadio" class="card-red" style="background:#1877F2"><i class="fab fa-facebook"></i> Facebook</a>
                <a href="https://www.youtube.com/@mundolaboralradio" class="card-red" style="background:#FF0000"><i class="fab fa-youtube"></i> YouTube</a>
                <a href="https://www.tiktok.com/@carlosfer_1971" class="card-red" style="background:#000"><i class="fab fa-tiktok"></i> TikTok</a>
                <a href="https://www.instagram.com/carlosfernandoaguilare/" class="card-red" style="background:#bc1888"><i class="fab fa-instagram"></i> Instagram</a>
                <a href="https://t.me/+OlAmHfkWb3I2MzEx" class="card-red" style="background:#0088cc"><i class="fab fa-telegram"></i> Telegram</a>
                <a href="https://chat.whatsapp.com/BMDRQO15kyPCFxomtgtIyX" class="card-red" style="background:#25D366"><i class="fab fa-whatsapp"></i> WhatsApp</a>
            </div>
        </div>

        <div id="noticias" class="seccion">
            <div style="background:#1a1a1a; padding:30px; border-radius:15px; border:1px solid var(--rojo);">
                <h2>Noticias</h2>
                <p>Aquí irá el resumen de la noticia laboral más importante del día.</p>
            </div>
        </div>

        <div id="contacto" class="seccion">
            <div class="form-contacto">
                <h2>Contacto</h2>
                <input type="text" id="c-nombre" placeholder="Nombre">
                <textarea id="c-mensaje" rows="4" placeholder="Mensaje"></textarea>
                <button onclick="enviarWA()" style="background:var(--rojo); color:white; padding:15px; border:none; width:100%; border-radius:8px; cursor:pointer;">ENVIAR</button>
            </div>
        </div>
    </div>

    <aside class="banner-side">
        <img src="https://i.postimg.cc/XYDgCbQV/Imagen-de-Whats-App-2024-02-18-a-las-13-11-48-5cb62194.jpg" class="banner-img" alt="Ad">
        <img src="https://i.postimg.cc/HkPtygBL/Logotipo-2020-CST.jpg" class="banner-img" alt="Ad">
        <img src="https://i.postimg.cc/g2BKZWNk/Sin-titulo.jpg" class="banner-img" alt="Ad">
    </aside>
</div>

<script>
    function ir(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function cambiarVideo(tipo) {
        document.querySelectorAll('.video-box').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.sub-nav button').forEach(b => b.classList.remove('active'));
        if(tipo === 'clasico') {
            document.getElementById('clasico-box').classList.add('active');
            document.getElementById('sub-btn-clasico').classList.add('active');
        } else {
            document.getElementById('live-box').classList.add('active');
            document.getElementById('sub-btn-live').classList.add('active');
        }
    }

    const radio = new Audio("https://azura1.bitstreaming.net/listen/mundolaboral/radio.mp3");
    let sonando = false;
    function toggleAudio() {
        const icon = document.getElementById("p-icon");
        const status = document.getElementById("status");
        if (!sonando) { radio.play(); icon.className = "fas fa-pause"; status.innerText = "SONANDO..."; sonando = true; } 
        else { radio.pause(); icon.className = "fas fa-play"; status.innerText = "Toca para escuchar"; sonando = false; }
    }

    function enviarWA() {
        const msg = document.getElementById('c-mensaje').value;
        const nombre = document.getElementById('c-nombre').value;
        window.open(`https://wa.me/59168785216?text=Hola soy ${nombre}, ${msg}`, '_blank');
    }
</script>
</body>
</html>
