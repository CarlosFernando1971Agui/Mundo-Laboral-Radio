<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulares de Noticias (RSS) - Mundo Laboral Radio</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000000;
            padding: 20px 10px;
            text-align: center;
            border-bottom: 2px solid #ff3b30;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        h1 span {
            color: #ff3b30;
        }

        <nav>
            <a href="index.html">INICIO</a>
            <a href="index.html#noticias">NOTICIAS</a>
            <a href="#" class="active">TITULARES RSS</a>
            <a href="index.html#redes">REDES</a>
            <a href="index.html#contacto">CONTACTO</a>
        </nav>
            color: #ffffff;
            text-decoration: none;
            padding: 8px 16px;
            background-color: #1c1c1e;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s, color 0.3s;
            border: 1px solid #2c2c2e;
        }

        nav a:hover, nav a.active {
            background-color: #ff3b30;
            color: #ffffff;
            border-color: #ff3b30;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .rss-section {
            background-color: #121214;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #2c2c2e;
        }

        .rss-section h2 {
            color: #ffffff;
            border-left: 4px solid #ff3b30;
            padding-left: 10px;
            margin-top: 0;
        }

        #rss-feed-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (min-width: 768px) {
            #rss-feed-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .feed-item {
            background-color: #1c1c1e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2c2c2e;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .feed-item:hover {
            transform: translateY(-3px);
            border-color: #ff3b30;
        }

        .feed-item h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }

        .feed-item h3 a {
            color: #ffffff;
            text-decoration: none;
        }

        .feed-item h3 a:hover {
            color: #ff3b30;
        }

        .feed-item p {
            color: #aeaebd;
            font-size: 0.95rem;
            line-height: 1.4;
            margin: 0 0 15px 0;
        }

        .feed-date {
            font-size: 0.8rem;
            color: #ff3b30;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 30px 10px;
            background-color: #000000;
            color: #8e8e93;
            font-size: 0.9rem;
            margin-top: 50px;
            border-top: 1px solid #1c1c1e;
        }
    </style>
</head>
<body>

    <header>
        <h1>MUNDO <span>LABORAL</span> RADIO</h1>
        <nav>
            <a href="index.html">INICIO</a>
            <a href="index.html#noticias">NOTICIAS</a>
            <a href="#" class="active">TITULARES RSS</a>
            <a href="index.html#redes">REDES</a>
            <a href="index.html#contacto">CONTACTO</a>
        </nav>
    </header>

    <div class="container">
        <div class="rss-section">
            <h2>ÚLTIMOS TITULARES (RSS)</h2>
            <p style="color: #aeaeae; font-size: 0.9rem;">Haz clic en cualquier titular para expandir la información completa en su portal respectivo.</p>
            
            <div id="rss-feed-container">
                <p style="color: #aeaeae;">Cargando titulares de noticias...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Mundo Laboral Radio - Desde Vallegrande al Mundo.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const rssUrl = "https://rss.app/feeds/QnRyyFuNBJFstj6P.xml";
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById("rss-feed-container");
                    if (data.status === "ok" && data.items.length > 0) {
                        container.innerHTML = ""; 
                        data.items.forEach(item => {
                            let cleanDescription = item.description.replace(/<[^>]*>/g, '');
                            if (cleanDescription.length > 140) {
                                cleanDescription = cleanDescription.substring(0, 140) + "...";
                            }
                            const dateOptions = { day: 'numeric', month: 'short', year: 'numeric' };
                            const formattedDate = new Date(item.pubDate).toLocaleDateString('es-ES', dateOptions);

                            container.innerHTML += `
                                <div class="feed-item">
                                    <div>
                                        <h3><a href="${item.link}" target="_blank">${item.title} ↗</a></h3>
                                        <p>${cleanDescription}</p>
                                    </div>
                                    <div class="feed-date">📅 ${formattedDate}</div>
                                </div>
                            `;
                        });
                    } else {
                        container.innerHTML = "<p>No se pudieron cargar los titulares en este momento.</p>";
                    }
                })
                .catch(error => {
                    document.getElementById("rss-feed-container").innerHTML = "<p>Error de conexión al cargar las noticias.</p>";
                });
        });
    </script>
</body>
</html>
